<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Canvas Starship</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://static.mreshank.com/gamepad/styles.css" />
  </head>
  <body class="gp-root gp-html5">
    <div class="gp-wrap">
      <p><a href="index.html" class="gp-btn gp-btn--ghost" style="display: inline-flex; margin-bottom: 1rem">← Lab</a></p>
      <h1 class="gp-heading">Twin-stick canvas ship</h1>
      <p id="status" class="gp-mono" style="font-size: 0.8rem; color: var(--gp-warn)">
        Press any button on your controller
      </p>
      <canvas id="c" class="gp-html5-canvas"></canvas>
      <p class="gp-mono" style="font-size: 0.72rem; color: var(--gp-text-faint)">
        Left stick · move · Right stick · rotate · R2 · boost
      </p>
    </div>
    <script src="gamepad.js"></script>
    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      const ship = { x: 0, y: 0, a: 0, trail: [] };
      const stars = [];

      function resize() {
        const rect = canvas.getBoundingClientRect();
        canvas.width = rect.width * devicePixelRatio;
        canvas.height = rect.height * devicePixelRatio;
        ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
        if (!stars.length) {
          for (let i = 0; i < 150; i++) {
            stars.push({
              x: Math.random() * rect.width,
              y: Math.random() * rect.height,
              z: Math.random(),
            });
          }
        }
        ship.x = rect.width / 2;
        ship.y = rect.height / 2;
      }
      window.addEventListener("resize", resize);
      resize();

      function draw(w, h) {
        ctx.fillStyle = "#030408";
        ctx.fillRect(0, 0, w, h);
        stars.forEach((s) => {
          ctx.fillStyle = `rgba(255,255,255,${0.15 + s.z * 0.5})`;
          ctx.fillRect(s.x, s.y, 1 + s.z * 2, 1 + s.z * 2);
        });
        ship.trail.forEach((t, i) => {
          ctx.globalAlpha = (i / ship.trail.length) * 0.7;
          ctx.fillStyle = "#00e8cc";
          ctx.beginPath();
          ctx.arc(t.x, t.y, 2.5, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.save();
        ctx.translate(ship.x, ship.y);
        ctx.rotate(ship.a);
        ctx.fillStyle = "#f97316";
        ctx.beginPath();
        ctx.moveTo(0, -16);
        ctx.lineTo(11, 14);
        ctx.lineTo(0, 9);
        ctx.lineTo(-11, 14);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      GamepadHTML5.poll((s) => {
        const st = document.getElementById("status");
        const w = canvas.getBoundingClientRect().width;
        const h = canvas.getBoundingClientRect().height;
        if (!s.connected) {
          st.textContent = "Connect controller & press any button";
          st.style.color = "var(--gp-warn)";
          draw(w, h);
          return;
        }
        st.textContent = s.id;
        st.style.color = "var(--gp-demo)";
        ship.a += s.rx * 0.06;
        const sp = 4 + s.r2 * 8;
        ship.x += Math.sin(ship.a) * -s.ly * sp + Math.cos(ship.a) * s.lx * sp;
        ship.y += Math.cos(ship.a) * -s.ly * sp + Math.sin(ship.a) * -s.lx * sp;
        ship.x = Math.max(24, Math.min(w - 24, ship.x));
        ship.y = Math.max(24, Math.min(h - 24, ship.y));
        ship.trail.push({ x: ship.x, y: ship.y });
        if (ship.trail.length > 50) ship.trail.shift();
        draw(w, h);
      });
    </script>
  </body>
</html>
