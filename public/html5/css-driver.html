<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Gamepad Driver</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://static.mreshank.com/gamepad/styles.css" />
  </head>
  <body class="gp-root gp-html5">
    <div class="gp-wrap">
      <p><a href="index.html" class="gp-btn gp-btn--ghost" style="display: inline-flex; margin-bottom: 1rem">← Lab</a></p>
      <h1 class="gp-heading">CSS-only driver</h1>
      <p id="status" class="gp-mono" style="font-size: 0.8rem; color: var(--gp-warn)">
        Press any button on your controller
      </p>
      <div id="stage" class="gp-html5-stage">
        <div id="car" class="gp-html5-car"></div>
      </div>
    </div>
    <script src="gamepad.js"></script>
    <script>
      const stage = document.getElementById("stage");
      const car = document.getElementById("car");
      let x = 0;
      let y = 0;
      const orbs = [];

      function layout() {
        x = stage.clientWidth / 2 - 24;
        y = stage.clientHeight / 2 - 24;
        car.style.transform = `translate(${x}px,${y}px)`;
      }
      layout();
      window.addEventListener("resize", layout);

      for (let i = 0; i < 10; i++) {
        const o = document.createElement("div");
        o.className = "gp-html5-orb";
        o.style.left = 40 + Math.random() * (stage.clientWidth - 80) + "px";
        o.style.top = 40 + Math.random() * (stage.clientHeight - 80) + "px";
        stage.appendChild(o);
        orbs.push(o);
      }

      GamepadHTML5.poll((s) => {
        const st = document.getElementById("status");
        if (!s.connected) {
          st.textContent = "Connect controller & press any button";
          st.style.color = "var(--gp-warn)";
          return;
        }
        st.textContent = s.id;
        st.style.color = "var(--gp-demo)";
        x += s.lx * 7;
        y += s.ly * 7;
        x = Math.max(8, Math.min(stage.clientWidth - 56, x));
        y = Math.max(8, Math.min(stage.clientHeight - 56, y));
        const rot = s.rx * 35;
        const scale = 1 + s.r2 * 0.35;
        car.style.transform = `translate(${x}px,${y}px) rotate(${rot}deg) scale(${scale})`;
        car.style.background = s.buttons[0]
          ? "linear-gradient(135deg,#00e8cc,#38bdf8)"
          : "linear-gradient(135deg,var(--gp-game),var(--gp-story))";
        orbs.forEach((o) => {
          const ox = parseFloat(o.style.left);
          const oy = parseFloat(o.style.top);
          if (Math.hypot(x + 24 - ox, y + 24 - oy) < 32) {
            o.style.left = 40 + Math.random() * (stage.clientWidth - 80) + "px";
            o.style.top = 40 + Math.random() * (stage.clientHeight - 80) + "px";
          }
        });
      });
    </script>
  </body>
</html>
