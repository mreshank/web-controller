<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Gamepad Driver</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      #stage {
        position: relative;
        height: 420px;
        margin: 1rem 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: radial-gradient(circle at 50% 50%, #1e293b, #030712);
        overflow: hidden;
      }
      #car {
        position: absolute;
        width: 48px;
        height: 48px;
        left: 50%;
        top: 50%;
        margin: -24px;
        border-radius: 8px;
        background: linear-gradient(135deg, #f472b6, #a78bfa);
        box-shadow: 0 0 30px rgba(244, 114, 182, 0.6);
        transition: background 0.1s;
      }
      .orb {
        position: absolute;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        background: #fde047;
        box-shadow: 0 0 12px #facc15;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p><a href="index.html">← HTML5 hub</a></p>
      <h1>CSS-only driver</h1>
      <p>DOM + transform — proof you do not need WebGL to impress a room.</p>
      <div id="stage">
        <div id="car"></div>
      </div>
    </div>
    <script src="gamepad.js"></script>
    <script>
      const stage = document.getElementById("stage");
      const car = document.getElementById("car");
      let x = 200,
        y = 200,
        orbs = [];
      for (let i = 0; i < 8; i++) {
        const o = document.createElement("div");
        o.className = "orb";
        o.style.left = Math.random() * 360 + 40 + "px";
        o.style.top = Math.random() * 300 + 40 + "px";
        stage.appendChild(o);
        orbs.push(o);
      }
      GamepadHTML5.poll((s) => {
        if (!s.connected) return;
        x += s.lx * 6;
        y += s.ly * 6;
        x = Math.max(24, Math.min(stage.clientWidth - 48, x));
        y = Math.max(24, Math.min(stage.clientHeight - 48, y));
        car.style.transform = `translate(${x}px,${y}px) rotate(${s.rx * 30}deg) scale(${
          1 + (s.buttons[7] ? 0.3 : 0)
        })`;
        if (s.buttons[0]) car.style.background = "linear-gradient(135deg,#38bdf8,#22d3ee)";
        else car.style.background = "linear-gradient(135deg,#f472b6,#a78bfa)";
        orbs.forEach((o) => {
          const ox = parseFloat(o.style.left);
          const oy = parseFloat(o.style.top);
          if (Math.hypot(x - ox, y - oy) < 28) {
            o.style.left = Math.random() * 360 + 40 + "px";
            o.style.top = Math.random() * 300 + 40 + "px";
          }
        });
      });
    </script>
  </body>
</html>
