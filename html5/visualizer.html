<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gamepad Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=IBM+Plex+Mono:wght@400;500;600&family=Syne:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://static.mreshank.com/gamepad/styles.css" />
  </head>
  <body class="gp-root gp-html5">
    <div class="gp-wrap">
      <p><a href="index.html" class="gp-btn gp-btn--ghost" style="display: inline-flex; margin-bottom: 1rem">← Lab</a></p>
      <h1 class="gp-heading">Live gamepad visualizer</h1>
      <p id="status" class="gp-mono" style="font-size: 0.8rem; color: var(--gp-warn)">
        Press any button after plugging in
      </p>
      <div class="gp-axis-grid" id="axes"></div>
      <pre id="btns" class="gp-mono" style="font-size: 0.75rem; color: var(--gp-text-muted); margin-top: 1rem"></pre>
      <pre id="slots" class="gp-mono" style="font-size: 0.72rem; color: var(--gp-text-faint); margin-top: 0.5rem"></pre>
    </div>
    <script src="gamepad.js"></script>
    <script>
      const labels = [
        ["LX", "lx"],
        ["LY", "ly"],
        ["RX", "rx"],
        ["RY", "ry"],
      ];
      const axesEl = document.getElementById("axes");
      labels.forEach(([label]) => {
        const div = document.createElement("div");
        div.className = "gp-axis";
        div.innerHTML = `
          <label class="gp-section-label">${label}</label>
          <span class="gp-mono val" id="v-${label}">0.00</span>
          <div class="gp-bar"><span class="gp-mid"></span><span class="gp-fill" id="b-${label}"></span></div>`;
        axesEl.appendChild(div);
      });

      function setAxis(label, v) {
        document.getElementById("v-" + label).textContent = v.toFixed(2);
        const fill = document.getElementById("b-" + label);
        const pct = Math.min(1, Math.abs(v)) * 50;
        if (v >= 0) {
          fill.style.left = "50%";
          fill.style.width = pct + "%";
        } else {
          fill.style.left = 50 - pct + "%";
          fill.style.width = pct + "%";
        }
      }

      GamepadHTML5.poll((s) => {
        const st = document.getElementById("status");
        if (!s.connected) {
          st.textContent = "No controller — plug in & press any button";
          st.style.color = "var(--gp-warn)";
          return;
        }
        st.textContent = "Connected: " + s.id + " (slot " + s.index + ")";
        st.style.color = "var(--gp-demo)";
        setAxis("LX", s.lx);
        setAxis("LY", s.ly);
        setAxis("RX", s.rx);
        setAxis("RY", s.ry);
        const pressed = s.buttons
          .map((b, i) => (b ? i : null))
          .filter((x) => x !== null);
        document.getElementById("btns").textContent =
          "Buttons pressed: " + (pressed.length ? pressed.join(", ") : "none");
        if (navigator.getGamepads) {
          const lines = [];
          navigator.getGamepads().forEach((p, i) => {
            if (p?.connected) lines.push(`  slot ${i}: ${p.id}`);
          });
          document.getElementById("slots").textContent = lines.length
            ? "All connected:\n" + lines.join("\n")
            : "";
        }
      });
    </script>
  </body>
</html>
