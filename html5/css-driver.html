<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CSS Gamepad Driver</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      #stage {
        position: relative;
        height: min(70vh, 420px);
        margin: 1rem 0;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background: radial-gradient(circle at 50% 50%, #1e293b, #030712);
        overflow: hidden;
      }
      #car {
        position: absolute;
        width: 48px;
        height: 48px;
        left: 0;
        top: 0;
        border-radius: 10px;
        background: linear-gradient(135deg, #f472b6, #a78bfa);
        box-shadow: 0 0 24px rgba(244, 114, 182, 0.55);
        will-change: transform;
      }
      .orb {
        position: absolute;
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: #fde047;
        box-shadow: 0 0 14px #facc15;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <p><a href="index.html">← HTML5 lab</a></p>
      <h1>CSS-only driver</h1>
      <p id="status">Press any button on your controller</p>
      <div id="stage">
        <div id="car"></div>
      </div>
    </div>
    <script src="gamepad.js"></script>
    <script>
      const stage = document.getElementById("stage");
      const car = document.getElementById("car");
      let x = 0;
      let y = 0;
      const orbs = [];

      function layout() {
        x = stage.clientWidth / 2 - 24;
        y = stage.clientHeight / 2 - 24;
        car.style.transform = `translate(${x}px,${y}px)`;
      }
      layout();
      window.addEventListener("resize", layout);

      for (let i = 0; i < 10; i++) {
        const o = document.createElement("div");
        o.className = "orb";
        o.style.left = 40 + Math.random() * (stage.clientWidth - 80) + "px";
        o.style.top = 40 + Math.random() * (stage.clientHeight - 80) + "px";
        stage.appendChild(o);
        orbs.push(o);
      }

      GamepadHTML5.poll((s) => {
        const st = document.getElementById("status");
        if (!s.connected) {
          st.textContent = "Connect controller & press any button";
          return;
        }
        st.textContent = s.id;
        x += s.lx * 7;
        y += s.ly * 7;
        x = Math.max(8, Math.min(stage.clientWidth - 56, x));
        y = Math.max(8, Math.min(stage.clientHeight - 56, y));
        const rot = s.rx * 35;
        const scale = 1 + s.r2 * 0.35;
        car.style.transform = `translate(${x}px,${y}px) rotate(${rot}deg) scale(${scale})`;
        car.style.background = s.buttons[0]
          ? "linear-gradient(135deg,#38bdf8,#22d3ee)"
          : "linear-gradient(135deg,#f472b6,#a78bfa)";
        orbs.forEach((o) => {
          const ox = parseFloat(o.style.left);
          const oy = parseFloat(o.style.top);
          if (Math.hypot(x + 24 - ox, y + 24 - oy) < 32) {
            o.style.left = 40 + Math.random() * (stage.clientWidth - 80) + "px";
            o.style.top = 40 + Math.random() * (stage.clientHeight - 80) + "px";
          }
        });
      });
    </script>
  </body>
</html>
